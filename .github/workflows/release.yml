name: Release & Publish to PyPI

on:
  # Automatic: fires on every push/merge to main (skips version-bump commits)
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/workflows/jekyll-gh-pages.yml"

  # Manual: choose release type explicitly from the Actions UI
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - patch   # bug fix / hotfix  →  x.y.Z
          - minor   # feature release   →  x.Y.0
          - major   # breaking change   →  X.0.0

jobs:
  bump-version-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push version-bump commit + tag

    steps:
      # Skip if this push was itself a version-bump commit (avoid infinite loop)
      - name: Check commit message
        id: guard
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if [[ "$MSG" == chore:\ bump\ version* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip == 'false'
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.skip == 'false'
        with:
          python-version: "3.11"

      - name: Install build tools
        if: steps.guard.outputs.skip == 'false'
        run: pip install build

      # ── 1. Detect release type (auto from commit msgs, or manual input) ──
      - name: Detect release type
        if: steps.guard.outputs.skip == 'false'
        id: detect
        run: |
          # Manual workflow_dispatch takes priority
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "release_type=${{ github.event.inputs.release_type }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Scan commits since last tag for conventional commit keywords
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -n "$LAST_TAG" ]]; then
            LOG=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")
          else
            LOG=$(git log --pretty=format:"%s")
          fi

          if echo "$LOG" | grep -qiE "^(feat|feature)(\(.+\))?!:|BREAKING.CHANGE"; then
            echo "release_type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LOG" | grep -qiE "^(feat|feature)(\(.+\))?:"; then
            echo "release_type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "release_type=patch" >> "$GITHUB_OUTPUT"
          fi

      # ── 2. Bump version in pyproject.toml ───────────────────────────────
      - name: Bump version
        if: steps.guard.outputs.skip == 'false'
        id: versioning
        run: |
          python3 - <<'PYEOF'
          import re, sys, os

          release_type = "${{ steps.detect.outputs.release_type }}"

          with open("pyproject.toml") as f:
              content = f.read()

          m = re.search(r'^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"', content, re.MULTILINE)
          if not m:
              sys.exit("ERROR: could not find version = \"x.y.z\" in pyproject.toml")

          major, minor, patch = int(m.group(1)), int(m.group(2)), int(m.group(3))

          if release_type == "major":
              major, minor, patch = major + 1, 0, 0
          elif release_type == "minor":
              minor, patch = minor + 1, 0
          else:
              patch += 1

          new_version = f"{major}.{minor}.{patch}"
          new_content = re.sub(
              r'^(version\s*=\s*)"[\d.]+"',
              f'\\1"{new_version}"',
              content,
              flags=re.MULTILINE,
          )

          with open("pyproject.toml", "w") as f:
              f.write(new_content)

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"new_version={new_version}\n")

          print(f"Bumped {release_type} → {new_version}")
          PYEOF

      # ── 3. Commit the bump and push a version tag ────────────────────────
      - name: Commit and tag
        if: steps.guard.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.versioning.outputs.new_version }}"
          git tag "v${{ steps.versioning.outputs.new_version }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${{ steps.versioning.outputs.new_version }}"

      # ── 3. Build source distribution + wheel ────────────────────────────
      - name: Build package
        run: python -m build

      # ── 4. Publish to PyPI ───────────────────────────────────────────────
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ vars.PYPI_API_TOKEN }}

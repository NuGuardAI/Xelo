<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 510 180"
     width="510" height="180"
     fill="none">
  <defs>
    <!-- Per-block gradient: bright lime centre → slightly dimmer lime edge -->
    <radialGradient id="block-grad" cx="50%" cy="50%" r="70%" fx="40%" fy="35%">
      <stop offset="0%"   stop-color="#a0ff60"/>
      <stop offset="55%"  stop-color="#80f050"/>
      <stop offset="100%" stop-color="#5acc28"/>
    </radialGradient>

    <!-- Outer bloom (very spread) -->
    <filter id="bloom-outer" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="b1"/>
    </filter>

    <!-- Mid halo -->
    <filter id="bloom-mid" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b2"/>
    </filter>

    <!-- Inner crisp glow -->
    <filter id="glow-inner" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b3"/>
      <feMerge>
        <feMergeNode in="b3"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

